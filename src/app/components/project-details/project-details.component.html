
@if (project) {
  <div class="project-display" style="color: white;">
    
    <div class="header-section" style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
      <img [src]="project.logoUrl" [alt]="project.name" style="width: 80px; height: 80px; object-fit: contain;" />
      <div>
        <h1 style="margin: 0; font-size: 2.5rem;">{{ project.name }}</h1>
        <p style="margin: 5px 0 0 0; color: #8892b0;">{{ project.shortDescription }}</p>
      </div>
    </div>
  </div>
  
  
<div class="gallery-section">
  <h3 style="color: #00d2ff; margin-bottom: 1.5rem;">Project Gallery</h3>
  
  <div class="screenshots-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem;">
    @for (num of screenshotNumbers; track num) {
      <div class="screenshot-card" 
           (click)="openImage(project.screenshotFolder + num + '.' + project.imageExtension)"
           style="background: #112240; padding: 10px; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s ease;">
        <img 
          [src]="project.screenshotFolder + num + '.' + project.imageExtension" 
          [alt]="project.name + ' view ' + num" 
          style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px; display: block;" 
        />
      </div>
    }
  </div>
</div>
}

@if (selectedImage) {
  <div class="image-modal-overlay" 
       (click)="closeImage()" 
       style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 12, 27, 0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: zoom-out;">
    
    <button (click)="closeImage()" 
            style="position: absolute; top: 20px; right: 30px; background: none; border: none; color: #64ffda; font-size: 2.5rem; cursor: pointer;">
      &times;
    </button>

    <img [src]="selectedImage" 
         alt="Full View" 
         style="max-width: 90%; max-height: 85%; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(1); animation: zoomIn 0.25s ease;" />
  </div>
}
